version: '3.3'
volumes:
    mysqldb:
    db:
services:
  mysqldb:
    image: mysql:5.7
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_DATABASE=irisdatabase
      - MYSQL_USER=fabric
      - MYSQL_PASSWORD=fabric123
      - MYSQL_ROOT_HOST="%"
    ports:
      - 3307:3306
    volumes:
      - db:/var/lib/mysql
      - "./scripts/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro"
      - "./scripts/schema.sql:/docker-entrypoint-initdb.d/1.sql"
  
  adminer:
    image: adminer:4.8.1
    ports:
      - "8082:8080"
